<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阵型链接工具</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .tips { color: #ff4444; font-size: 14px; margin-bottom: 20px; }
        textarea {
            width: 100%; height: 150px; background: #111; color: #fff;
            border: 1px solid #4da6ff; border-radius: 8px; padding: 10px;
            box-sizing: border-box; font-size: 16px;
        }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button {
            flex: 1; border: none; border-radius: 8px; padding: 15px;
            font-size: 18px; color: #fff; cursor: pointer;
        }
        .btn-blue { background: #4da6ff; }
        .btn-red { background: #ff4d4d; }
    </style>
</head>
<body>
    <div class="tips">注意：请在手机自带浏览器打开，并确保游戏在后台运行</div>
    <textarea id="linkInput" placeholder="这里输入阵型或配兵的链接..."></textarea>
    <div class="btn-group">
        <button class="btn-blue" onclick="openGame()">打开部落冲突</button>
        <button class="btn-red" onclick="clearInput()">清空</button>
    </div>

    <script>
        function openGame() {
            let link = document.getElementById('linkInput').value;
            if(link) {
                window.location.href = link; // 核心跳转代码
            } else {
                alert("请先输入链接！");
            }
        }
        function clearInput() {
            document.getElementById('linkInput').value = '';
        }
    </script>
</body>
</html>
