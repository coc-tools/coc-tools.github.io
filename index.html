
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部落冲突阵型链接打开器</title>
    <style>
        /* 清除默认边距，统一背景色 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa; /* 浅灰底色 */
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
        }
        /* 容器最大宽度，适配手机和电脑端 */
        .container {
            max-width: 400px; 
            width: 100%;
        }
        /* 顶部红色提示语 */
        .tips {
            color: #ff5e5e;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        /* 输入框区域 */
        .input-area {
            width: 100%;
            min-height: 160px;
            background: #ffffff;
            border: 1px solid #eac069; /* 截图里的黄/金色边框 */
            border-radius: 8px;
            padding: 15px;
            font-size: 15px;
            font-family: inherit;
            color: #333;
            resize: none;
            outline: none;
        }
        .input-area:focus {
            border-color: #d4a33d;
        }
        .input-area::placeholder {
            color: #999;
        }
        /* 按钮组布局 */
        .btn-group {
            display: flex;
            gap: 12px; /* 两个按钮的间距 */
            margin-top: 20px;
        }
        /* 按钮基本样式 */
        .btn {
            flex: 1; /* 两个按钮平分宽度 */
            padding: 14px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
        /* 蓝色打开按钮 */
        .btn-open {
            background-color: #3a9df5; 
        }
        /* 红色清空按钮 */
        .btn-clear {
            background-color: #f46262; 
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 倾城coc -->
    <div class="tips">注意：强制跳转国际服 需游戏在后台运行</div>
    <!-- 输入框 -->
    <textarea class="input-area" id="linkInput" placeholder="这里输入阵型或配兵的链接..."></textarea>
    <!-- 操作按钮 -->
    <div class="btn-group">
        <button class="btn btn-open" id="openBtn">打开部落冲突</button>
        <button class="btn btn-clear" id="clearBtn">清空</button>
    </div>
</div>
<script>
    const linkInput = document.getElementById('linkInput');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    // 1. 检测是否为安卓系统
    const isAndroid = /android/i.test(navigator.userAgent);
    // 2. 打开游戏按钮逻辑
    openBtn.addEventListener('click', function() {
        let url = linkInput.value.trim();
        if (!url) {
            alert('请先输入阵型或配兵的链接！');
            return;
        }
        // 3. 如果用户使用的是安卓手机，且输入的是 https 开头的链接
        // 强制转换为 intent 协议，并指定国际服包名 (com.supercell.clashofclans)
        if (isAndroid && url.startsWith('https://link.clashofclans.com')) {
            // 提取链接 ? 后面的参数部分
            let params = url.split('?')[1];
            // 构建强制跳转国际服的 intent 链接
            url = `intent://open_layout?${params}#Intent;scheme=clashofclans;package=com.supercell.clashofclans;end;`;
        } else if (!isAndroid) {
            // 如果是苹果 iOS 系统，无法通过代码强制选服，弹窗提示用户手动操作
            // (保留你之前要求的强力提示逻辑)
            alert(" iOS 提示：如果你的手机里同时装有国服和国际服，苹果系统必定会弹窗让你选择。\n【唯一解决办法】：卸载掉你不需要的那个版本，下次点击就能直接进入国际服！");
        }
        // 4. 执行最终跳转
        window.location.href = url;
    });
    // 5. 清空按钮逻辑
    clearBtn.addEventListener('click', function() {
        linkInput.value = '';
    });
</script>
</body>
</html>
